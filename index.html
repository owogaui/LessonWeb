<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">	
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新竹一支會陪課紀錄</title>

<style>
body{
    font-family: Arial;
    background:#f3f6fa;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{text-align:center;}

.input-group, .filter-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input,textarea,select,button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

input,textarea{flex:1;}

#student{
    flex:0.8;
}

#teacher{
    flex:0.7;
}

textarea{
    min-height:140px;
    width:100%;
    resize:vertical;
}

button{
    background:#4a90e2;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{opacity:.85;}

.card{
    background:#f8f9ff;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border-left:5px solid #4a90e2;
}

.sync-status{
    font-size:13px;
    margin-top:6px;
    padding:6px 12px;
    border-radius:6px;
    display:inline-block;
}

.sync-ok{background:#d4edda;color:#276c3a;}
.sync-fail{background:#fde8e8;color:#9a2c2c;}
.sync-ing{background:#fff3cd;color:#856404;}

.divider{
    height:2px;
    background:#ddd;
    margin:25px 0;
}
</style>
</head>

<body>
<div class="container">
<h1>📚 陪課紀錄系統</h1>

<div class="input-group">
    <div style="width:100%; color:#666; font-size:14px; margin-bottom:5px;">
        🔎 下面是陪課完之後可以來這邊新增當日狀況
    </div>

    <input type="date" id="date">

    <select id="teacher">
        <option value="">我是誰？</option>
        <option value="家毅">家毅</option>
    </select>

    <button type="button" onclick="addTeacher()">新增陪課員</button>

    <input type="text" id="student" placeholder="陪了誰?">

    <textarea id="status" placeholder="輸入陪課內容 / 心得"></textarea>

    <button onclick="addRecord()">新增紀錄</button>
</div>

<div class="divider"></div>

<div class="filter-group">
    <div style="width:100%; color:#666; font-size:14px; margin-bottom:5px;">
        🔎 下面是先前紀錄，可以使用搜尋工具輔助尋找
    </div>

    <input type="date" id="filterDate">
    <input type="text" id="filterStudent" placeholder="篩選成員">
    <button onclick="applyFilter()">送出篩選</button>
    <button onclick="resetFilter()">清除</button>
</div>

<div id="syncMsg"></div>
<div id="records"></div>

</div>

<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbz9XDPTT4YqE7vGO_uNcEam76Oi48LlNq33wmslAUXYAG6ROtTS6mbFZgqRkaYDm66i/exec';

let records = [];
let filteredRecords = [];

window.onload = async () => {
    await loadFromSheets();
};

async function loadFromSheets(){
    try{
        const res = await fetch(GAS_URL);
        const data = await res.json();

        records = data;
        filteredRecords = data;

        render();
    } catch(err){
        showSyncMsg("❌ 無法讀取 Google Sheets", "fail");
    }
}

function addTeacher(){
    const name = prompt("輸入新的陪課員名稱");

    if(!name || !name.trim()) return;

    const cleanName = name.trim();
    const select = document.getElementById("teacher");

    const exists = [...select.options].some(option => option.value === cleanName);

    if(exists){
        select.value = cleanName;
        return;
    }

    const option = document.createElement("option");
    option.value = cleanName;
    option.textContent = cleanName;

    select.appendChild(option);
    select.value = cleanName;
}

async function addRecord(){
    const date = document.getElementById("date").value;
    const teacher = document.getElementById("teacher").value;
    const student = document.getElementById("student").value.trim();
    const status = document.getElementById("status").value.trim();

    if(!date || !teacher || !student){
        alert("請填日期、陪課員與陪了誰");
        return;
    }

    const newRecord = {
        date,
        teacher,
        student,
        status
    };

    records.push(newRecord);
    filteredRecords = records;

    render();

    await syncToSheets(newRecord);

    document.getElementById("student").value = "";
    document.getElementById("status").value = "";
}

function applyFilter(){
    const d = document.getElementById("filterDate").value;
    const s = document.getElementById("filterStudent").value.trim();

    filteredRecords = records.filter(r => {
        return (!d || r.date === d) &&
               (!s || r.student.includes(s));
    });

    render();
}

function resetFilter(){
    document.getElementById("filterDate").value = "";
    document.getElementById("filterStudent").value = "";

    filteredRecords = records;
    render();
}

function render(){
    const area = document.getElementById("records");
    area.innerHTML = "";

    filteredRecords.forEach((r) => {
        area.innerHTML += `
        <div class="card">
            <h3>${r.student}</h3>
            <p>👤 陪課員：${r.teacher || "未填寫"}</p>
            <p>📅 ${r.date}</p>
            <pre>${r.status}</pre>
        </div>`;
    });
}

async function syncToSheets(record){
    showSyncMsg("⏳ 同步中...", "ing");

    try{
        await fetch(GAS_URL,{
            method:"POST",
            mode:"no-cors",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(record)
        });

        showSyncMsg("✅ 已同步", "ok");
    } catch(e){
        showSyncMsg("❌ 同步失敗", "fail");
    }
}

function showSyncMsg(msg,type){
    const el = document.getElementById("syncMsg");
    el.innerHTML = `<span class="sync-status sync-${type}">${msg}</span>`;
}

</script>
</body>
</html>
