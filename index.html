<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新竹一支會陪課紀錄</title>

<style>
:root{
    --blue:#4a6fe2;
    --blue-dark:#3a59c4;
    --blue-soft:#eef2ff;
    --ink:#2b2f3a;
    --ink-soft:#6b7280;
    --line:#e6e8f0;
    --bg:#eef1f8;
    --card:#ffffff;
    --ok-bg:#e3f6e9; --ok-fg:#1f7a43;
    --fail-bg:#fde8e8; --fail-fg:#9a2c2c;
    --ing-bg:#fff3cd; --ing-fg:#8a6400;
    --radius:14px;
}

*{box-sizing:border-box;}

body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif;
    background:var(--bg);
    margin:0;
    padding:24px 16px 60px;
    color:var(--ink);
}

.wrap{
    max-width:880px;
    margin:auto;
}

/* ---------- Header ---------- */
.page-head{
    text-align:center;
    margin-bottom:22px;
}

.page-head .eyebrow{
    font-size:13px;
    letter-spacing:.08em;
    color:var(--blue-dark);
    font-weight:700;
    margin-bottom:4px;
}

.page-head h1{
    font-size:24px;
    margin:0;
}

.page-head p{
    color:var(--ink-soft);
    font-size:13.5px;
    margin:6px 0 0;
}

/* ---------- Section card shell ---------- */
.section{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:0 2px 14px rgba(40,50,90,.07);
    padding:22px;
    margin-bottom:20px;
}

.section-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
}

.section-badge{
    width:30px;height:30px;
    border-radius:9px;
    background:var(--blue-soft);
    color:var(--blue-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex-shrink:0;
}

.section-title{
    font-size:16px;
    font-weight:700;
    margin:0;
}

.section-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:2px 0 0;
}

/* ---------- Form ---------- */
.field{
    margin-bottom:14px;
}

.field label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:6px;
}

.field-row{
    display:flex;
    gap:12px;
}

.field-row .field{
    flex:1;
    min-width:0;
}

input,textarea,select,button{
    font-family:inherit;
    font-size:14.5px;
}

input,textarea,select{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:#fbfcff;
    color:var(--ink);
    transition:border-color .15s, background .15s;
}

input:focus,textarea:focus,select:focus{
    outline:none;
    border-color:var(--blue);
    background:#fff;
}

textarea{
    min-height:110px;
    resize:vertical;
    line-height:1.5;
}

#addTeacherBox{
    display:none;
    gap:8px;
    margin-top:8px;
}

#addTeacherBox input{flex:1;}

#addTeacherBox button{
    flex-shrink:0;
    width:auto;
    padding:0 16px;
}

.btn-primary{
    width:100%;
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:13px;
    font-weight:700;
    cursor:pointer;
    transition:background .15s, transform .1s;
}

.btn-primary:hover{background:var(--blue-dark);}
.btn-primary:active{transform:scale(.99);}

.btn-ghost{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
    border-radius:10px;
    cursor:pointer;
    padding:0 16px;
}

.btn-ghost:hover{
    border-color:var(--blue);
    color:var(--blue-dark);
}

.sync-status{
    font-size:13px;
    margin-top:12px;
    padding:9px 14px;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:600;
}

.sync-ok{background:var(--ok-bg);color:var(--ok-fg);}
.sync-fail{background:var(--fail-bg);color:var(--fail-fg);}
.sync-ing{background:var(--ing-bg);color:var(--ing-fg);}

/* ---------- Filter section ---------- */
.view-toggle{
    display:flex;
    background:var(--blue-soft);
    border-radius:10px;
    padding:4px;
    margin-bottom:14px;
}

.view-toggle button{
    flex:1;
    border:none;
    background:transparent;
    padding:9px 0;
    border-radius:8px;
    font-weight:700;
    font-size:13.5px;
    color:var(--blue-dark);
    cursor:pointer;
}

.view-toggle button.active{
    background:var(--blue);
    color:#fff;
}

.filter-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:12px;
}

.filter-actions{
    display:flex;
    gap:10px;
}

.filter-actions button{
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
    font-weight:700;
    font-size:13.5px;
    border:none;
}

.filter-actions .apply{
    background:var(--blue);
    color:#fff;
}

.filter-actions .apply:hover{background:var(--blue-dark);}

.filter-actions .reset{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
}

.filter-actions .reset:hover{
    border-color:var(--blue);
    color:var(--blue-dark);
}

.result-count{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:14px 0 10px;
}

/* ---------- Record cards ---------- */
.card{
    background:#fbfcff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 18px;
    margin-bottom:12px;
    border-left:4px solid var(--blue);
}

.card-top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:8px;
}

.card-student{
    font-size:16px;
    font-weight:700;
    margin:0;
}

.card-time{
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
}

.card-teacher{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12.5px;
    color:var(--blue-dark);
    background:var(--blue-soft);
    padding:3px 10px;
    border-radius:99px;
    margin-bottom:10px;
}

.card pre{
    white-space:pre-wrap;
    word-break:break-word;
    font-family:inherit;
    font-size:13.5px;
    line-height:1.6;
    color:var(--ink);
    margin:0;
}

.card pre:empty::before{
    content:"（沒有填寫心得內容）";
    color:#aab0bd;
}

/* ---------- Chart ---------- */
.chart-box{
    background:#fbfcff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    overflow-x:auto;
}

.chart-title{
    margin:0 0 14px;
    font-size:14px;
    font-weight:700;
}

.chart{
    display:flex;
    align-items:flex-end;
    gap:8px;
    height:220px;
    border-left:2px solid var(--line);
    border-bottom:2px solid var(--line);
    padding:10px 10px 0;
    min-width:900px;
}

.bar-wrap{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    flex:1;
}

.bar-wrap.is-today .bar{
    background:#ff8a3d;
}

.bar-wrap.is-today .bar-date{
    color:#ff8a3d;
    font-weight:700;
}

.bar{
    width:22px;
    background:var(--blue);
    border-radius:5px 5px 0 0;
    margin:auto;
    transition:height .25s;
}

.bar-count{
    font-size:11.5px;
    margin-bottom:4px;
    font-weight:700;
    color:var(--ink);
}

.bar-date{
    writing-mode:vertical-rl;
    margin-top:6px;
}

/* ---------- Empty / warn states ---------- */
.empty-msg{
    text-align:center;
    color:var(--ink-soft);
    padding:36px 0;
    font-size:13.5px;
}

.empty-msg .emoji{
    font-size:30px;
    display:block;
    margin-bottom:8px;
}

.warn-msg{
    background:var(--ing-bg);
    color:var(--ing-fg);
    padding:14px 16px;
    border-radius:10px;
    font-size:13.5px;
}

/* ---------- Mobile ---------- */
@media(max-width:640px){
    body{padding:16px 10px 50px;}

    .section{padding:16px;}

    .field-row{
        flex-direction:column;
        gap:0;
    }

    .filter-grid{
        grid-template-columns:1fr;
    }

    .filter-actions{
        flex-direction:column;
    }

    .filter-actions button{
        width:100%;
    }

    #addTeacherBox{
        flex-direction:column;
    }

    #addTeacherBox input,
    #addTeacherBox button{
        width:100%;
    }

    #newTeacherName{
        font-size:16px;
        padding:12px;
    }

    .card-top{
        flex-direction:column;
        gap:2px;
    }

    .chart{
        height:200px;
        min-width:820px;
    }
}
</style>
</head>

<body>
<div class="wrap">

<div class="page-head">
    <div class="eyebrow">新竹一支會</div>
    <h1>📚 陪課紀錄系統</h1>
    <p>陪課結束後花一分鐘記錄，讓每一次陪伴都被看見</p>
</div>

<!-- 新增紀錄 -->
<div class="section">
    <div class="section-head">
        <div class="section-badge">✏️</div>
        <div>
            <p class="section-title">新增今日陪課紀錄</p>
            <p class="section-sub">陪課完之後，花一分鐘記下今天的狀況</p>
        </div>
    </div>

    <div class="field-row">
        <div class="field">
            <label for="classTime">陪課時間</label>
            <input type="datetime-local" id="classTime">
        </div>
        <div class="field">
            <label for="teacher">你是誰</label>
            <select id="teacher" onchange="handleTeacherChange()">
                <option value="">請選擇你的名字</option>
                <option value="__add__">＋ 新增陪課員</option>
            </select>
            <div id="addTeacherBox">
                <input type="text" id="newTeacherName" placeholder="輸入新的陪課員名字">
                <button type="button" class="btn-ghost" onclick="confirmAddTeacher()">確認</button>
                <button type="button" class="btn-ghost" onclick="cancelAddTeacher()">取消</button>
            </div>
        </div>
    </div>

    <div class="field">
        <label for="student">陪了誰</label>
        <input type="text" id="student" placeholder="輸入被陪課成員的名字">
    </div>

    <div class="field">
        <label for="status">陪課內容 / 心得</label>
        <textarea id="status" placeholder="今天上了什麼？孩子的狀況如何？有什麼想記下來的..."></textarea>
    </div>

    <button class="btn-primary" onclick="addRecord()">送出紀錄</button>

    <div id="syncMsg"></div>
</div>

<!-- 查詢紀錄 -->
<div class="section">
    <div class="section-head">
        <div class="section-badge">🔍</div>
        <div>
            <p class="section-title">查詢先前紀錄</p>
            <p class="section-sub">用篩選工具快速找到你要的紀錄</p>
        </div>
    </div>

    <div class="view-toggle">
        <button type="button" id="btn-detail" class="active" onclick="setViewMode('detail')">📝 心得詳情</button>
        <button type="button" id="btn-count" onclick="setViewMode('count')">📊 陪課次數表</button>
    </div>

    <div class="filter-grid">
        <div class="field" style="margin-bottom:0;">
            <label for="filterDate">日期</label>
            <input type="date" id="filterDate">
        </div>
        <div class="field" style="margin-bottom:0;">
            <label for="filterTeacher">陪課員</label>
            <select id="filterTeacher">
                <option value="">全部陪課員</option>
            </select>
        </div>
        <div class="field" style="margin-bottom:0;">
            <label for="filterStudent">被陪課成員</label>
            <select id="filterStudent">
                <option value="">全部被陪課成員</option>
            </select>
        </div>
    </div>

    <div class="filter-actions">
        <button class="apply" onclick="applyFilter()">送出篩選</button>
        <button class="reset" onclick="resetFilter()">清除篩選</button>
    </div>

    <div id="resultCount" class="result-count"></div>
    <div id="records"></div>
</div>

</div>

<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbws0OC2ivLQJli-hAYc8JA5N2dA6Ts4SGLKNZaCLRVR3D_BDa_dUGaeUhipevUf9gdH/exec';

let records = [];
let filteredRecords = [];
let currentViewMode = "detail";

window.onload = async () => {
    setNowClassTime();
    await loadFromSheets();
};

function setNowClassTime(){
    const now = new Date();
    now.setSeconds(0, 0);
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0,16);

    document.getElementById("classTime").value = local;
}

async function loadFromSheets(){
    try{
        const res = await fetch(GAS_URL);
        const data = await res.json();

        records = Array.isArray(data) ? data : [];
        filteredRecords = records;

        updateSelectOptions();
        renderDetail();
    } catch(err){
        showSyncMsg("❌ 無法讀取 Google Sheets", "fail");
    }
}

function handleTeacherChange(){
    const select = document.getElementById("teacher");

    if(select.value === "__add__"){
        document.getElementById("addTeacherBox").style.display = "flex";
        document.getElementById("newTeacherName").focus();
    }else{
        document.getElementById("addTeacherBox").style.display = "none";
    }
}

function confirmAddTeacher(){
    const input = document.getElementById("newTeacherName");
    const name = input.value.trim();

    if(!name){
        alert("請輸入陪課員名字");
        return;
    }

    const teacherSelect = document.getElementById("teacher");

    addOptionIfNotExists(teacherSelect, name, name);
    teacherSelect.value = name;

    input.value = "";
    document.getElementById("addTeacherBox").style.display = "none";
    updateSelectOptions();
}

function cancelAddTeacher(){
    document.getElementById("newTeacherName").value = "";
    document.getElementById("addTeacherBox").style.display = "none";
    document.getElementById("teacher").value = "";
}

async function addRecord(){
    const classTime = document.getElementById("classTime").value;
    const date = classTime ? classTime.slice(0,10) : "";
    const teacher = document.getElementById("teacher").value;
    const student = document.getElementById("student").value.trim();
    const status = document.getElementById("status").value.trim();

    if(!classTime || !teacher || teacher === "__add__" || !student){
        alert("請填陪課時間、陪課員與陪了誰");
        return;
    }

    const newRecord = {
        classTime,
        date,
        teacher,
        student,
        status
    };

    records.push(newRecord);
    filteredRecords = records;

    updateSelectOptions();
    renderDetail();

    await syncToSheets(newRecord);

    document.getElementById("student").value = "";
    document.getElementById("status").value = "";
    setNowClassTime();
}

function setViewMode(mode){
    currentViewMode = mode;

    document.getElementById("btn-detail").classList.toggle("active", mode === "detail");
    document.getElementById("btn-count").classList.toggle("active", mode === "count");

    applyFilter();
}

function applyFilter(){
    const mode = currentViewMode;
    const d = document.getElementById("filterDate").value;
    const teacher = document.getElementById("filterTeacher").value;
    const student = document.getElementById("filterStudent").value;

    document.getElementById("resultCount").textContent = "";

    if(mode === "count" && !teacher && !student){
        document.getElementById("records").innerHTML = `
            <div class="warn-msg">
                ⚠️ 請先選擇「陪課員」或「被陪課成員」，再查看陪課次數表。
            </div>
        `;
        return;
    }

    filteredRecords = records.filter(r => {
        return (!d || r.date === d) &&
               (!teacher || r.teacher === teacher) &&
               (!student || r.student === student);
    });

    if(mode === "count"){
        renderCountChart();
    }else{
        renderDetail();
    }
}

function resetFilter(){
    document.getElementById("filterDate").value = "";
    document.getElementById("filterTeacher").value = "";
    document.getElementById("filterStudent").value = "";

    setViewMode("detail");
}

function updateSelectOptions(){
    const teacherSelect = document.getElementById("teacher");
    const filterTeacher = document.getElementById("filterTeacher");
    const filterStudent = document.getElementById("filterStudent");

    const currentTeacher = teacherSelect.value;
    const currentFilterTeacher = filterTeacher.value;
    const currentFilterStudent = filterStudent.value;

    const teachers = [...new Set(records.map(r => r.teacher).filter(Boolean))];
    const students = [...new Set(records.map(r => r.student).filter(Boolean))];

    teacherSelect.innerHTML = `
        <option value="">請選擇你的名字</option>
        <option value="__add__">＋ 新增陪課員</option>
    `;

    teachers.forEach(name => addOptionIfNotExists(teacherSelect, name, name));

    if(currentTeacher && currentTeacher !== "__add__"){
        addOptionIfNotExists(teacherSelect, currentTeacher, currentTeacher);
        teacherSelect.value = currentTeacher;
    }

    filterTeacher.innerHTML = `<option value="">全部陪課員</option>`;
    teachers.forEach(name => addOptionIfNotExists(filterTeacher, name, name));

    if(currentFilterTeacher){
        addOptionIfNotExists(filterTeacher, currentFilterTeacher, currentFilterTeacher);
        filterTeacher.value = currentFilterTeacher;
    }

    filterStudent.innerHTML = `<option value="">全部被陪課成員</option>`;
    students.forEach(name => addOptionIfNotExists(filterStudent, name, name));

    if(currentFilterStudent){
        addOptionIfNotExists(filterStudent, currentFilterStudent, currentFilterStudent);
        filterStudent.value = currentFilterStudent;
    }
}

function addOptionIfNotExists(select, value, text){
    const exists = [...select.options].some(option => option.value === value);

    if(!exists){
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
    }
}

function escapeHTML(str){
    return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatClassTime(value){
    if(!value) return "未填寫";
    return value.replace("T", " ");
}

function renderDetail(){
    const area = document.getElementById("records");
    const countEl = document.getElementById("resultCount");
    area.innerHTML = "";

    if(filteredRecords.length === 0){
        countEl.textContent = "";
        area.innerHTML = `
            <div class="empty-msg">
                <span class="emoji">📭</span>
                目前沒有符合條件的紀錄
            </div>`;
        return;
    }

    countEl.textContent = `共 ${filteredRecords.length} 筆紀錄`;

    const sorted = [...filteredRecords].sort((a, b) => {
        return (b.classTime || b.date || "").localeCompare(a.classTime || a.date || "");
    });

    sorted.forEach((r) => {
        area.innerHTML += `
        <div class="card">
            <div class="card-top">
                <h3 class="card-student">${escapeHTML(r.student)}</h3>
                <span class="card-time">🕒 ${escapeHTML(formatClassTime(r.classTime || r.date))}</span>
            </div>
            <span class="card-teacher">👤 ${escapeHTML(r.teacher || "未填寫")}</span>
            <pre>${escapeHTML(r.status || "")}</pre>
        </div>`;
    });
}

function renderCountChart(){
    const area = document.getElementById("records");
    const countEl = document.getElementById("resultCount");

    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
    const dates = [];

    for(let i = -15; i <= 15; i++){
        const d = new Date(today);
        d.setDate(today.getDate() + i);

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");

        dates.push(`${yyyy}-${mm}-${dd}`);
    }

    const countMap = {};
    dates.forEach(date => countMap[date] = 0);

    filteredRecords.forEach(r => {
        if(countMap[r.date] !== undefined){
            countMap[r.date]++;
        }
    });

    const totalCount = Object.values(countMap).reduce((a,b) => a+b, 0);
    const maxCount = Math.max(...Object.values(countMap), 1);

    countEl.textContent = `區間內共 ${totalCount} 筆紀錄`;

    let html = `
        <div class="chart-box">
            <h3 class="chart-title">📊 陪課次數表：前15天 ～ 後15天</h3>
            <div class="chart">
    `;

    dates.forEach(date => {
        const count = countMap[date];
        const height = count === 0 ? 4 : (count / maxCount) * 180;
        const todayClass = date === todayStr ? " is-today" : "";

        html += `
            <div class="bar-wrap${todayClass}">
                <div class="bar-count">${count}</div>
                <div class="bar" style="height:${height}px"></div>
                <div class="bar-date">${date.slice(5)}${date === todayStr ? " ・今天" : ""}</div>
            </div>
        `;
    });

    html += `
            </div>
        </div>
    `;

    area.innerHTML = html;
}

async function syncToSheets(record){
    showSyncMsg("⏳ 同步中...", "ing");

    try{
        await fetch(GAS_URL,{
            method:"POST",
            mode:"no-cors",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(record)
        });

        showSyncMsg("✅ 已同步至雲端", "ok");
    } catch(e){
        showSyncMsg("❌ 同步失敗，請檢查網路後再試一次", "fail");
    }
}

function showSyncMsg(msg,type){
    const el = document.getElementById("syncMsg");
    el.innerHTML = `<div class="sync-status sync-${type}">${msg}</div>`;
}

</script>
</body>
</html>
