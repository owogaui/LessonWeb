<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">	
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新竹一支會陪課紀錄</title>

<style>
body{
    font-family: Arial;
    background:#f3f6fa;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{text-align:center;}

.input-group, .filter-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input,textarea,select,button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

input,textarea{flex:1;}

#student{flex:0.8;}
#teacher{flex:0.9;}

textarea{
    min-height:140px;
    width:100%;
    resize:vertical;
}

button{
    background:#4a90e2;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{opacity:.85;}

.card{
    background:#f8f9ff;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border-left:5px solid #4a90e2;
}

.sync-status{
    font-size:13px;
    margin-top:6px;
    padding:6px 12px;
    border-radius:6px;
    display:inline-block;
}

.sync-ok{background:#d4edda;color:#276c3a;}
.sync-fail{background:#fde8e8;color:#9a2c2c;}
.sync-ing{background:#fff3cd;color:#856404;}

.divider{
    height:2px;
    background:#ddd;
    margin:25px 0;
}

pre{
    white-space:pre-wrap;
    word-break:break-word;
}

/* 查詢區欄位變矮 */
.filter-group input,
.filter-group select,
.filter-group button{
    padding:6px 8px;
    height:34px;
    font-size:13px;
}

/* 新增陪課員輸入區 */
#addTeacherBox{
    width:100%;
    display:none;
    gap:8px;
    margin-top:5px;
}

#addTeacherBox input{
    flex:1;
}

/* 陪課次數表 */
.chart-box{
    margin-top:20px;
    background:#f8f9ff;
    padding:15px;
    border-radius:10px;
    overflow-x:auto;
}

.chart-title{
    margin-bottom:10px;
    color:#333;
}

.chart{
    display:flex;
    align-items:flex-end;
    gap:8px;
    height:260px;
    border-left:2px solid #555;
    border-bottom:2px solid #555;
    padding:10px;
    min-width:900px;
}

.bar-wrap{
    text-align:center;
    font-size:12px;
    color:#555;
}

.bar{
    width:24px;
    background:#4a90e2;
    border-radius:5px 5px 0 0;
    margin:auto;
}

.bar-count{
    font-size:12px;
    margin-bottom:4px;
}

.bar-date{
    writing-mode:vertical-rl;
    margin-top:6px;
}

.empty-msg{
    text-align:center;
    color:#777;
    padding:30px 0;
}

@media(max-width:600px){
    body{
        padding:12px;
    }

    .container{
        padding:16px;
    }

    .input-group,
    .filter-group{
        gap:8px;
    }

    input,
    select,
    button{
        width:100%;
        flex:auto;
    }

    textarea{
        min-height:130px;
    }

    .filter-group input,
    .filter-group select,
    .filter-group button{
        height:32px;
        padding:5px 8px;
    }

    #addTeacherBox{
        flex-direction:column;
        width:100%;
    }

    #addTeacherBox input{
        width:100%;
        flex:none;
    }

    #addTeacherBox button{
        width:100%;
        flex:none;
    }

    #newTeacherName{
        font-size:16px;
        padding:12px;
    }

    .chart{
        height:240px;
        min-width:850px;
    }

    .bar{
        width:22px;
    }
}
</style>
</head>

<body>
<div class="container">
<h1>📚 陪課紀錄系統</h1>

<div class="input-group">
    <div style="width:100%; color:#666; font-size:14px; margin-bottom:5px;">
        🔎 下面是陪課完之後可以來這邊新增當日狀況
    </div>

    <input type="datetime-local" id="classTime">

    <select id="teacher" onchange="handleTeacherChange()">
        <option value="">請輸入你的名字</option>
        <option value="__add__">＋ 新增陪課員</option>
    </select>

    <div id="addTeacherBox">
        <input type="text" id="newTeacherName" placeholder="輸入新的陪課員名字">
        <button type="button" onclick="confirmAddTeacher()">確認新增</button>
        <button type="button" onclick="cancelAddTeacher()">取消</button>
    </div>

    <input type="text" id="student" placeholder="陪了誰?">

    <textarea id="status" placeholder="輸入陪課內容 / 心得"></textarea>

    <button onclick="addRecord()">新增紀錄</button>
</div>

<div class="divider"></div>

<div class="filter-group">
    <div style="width:100%; color:#666; font-size:14px; margin-bottom:5px;">
        🔎 下面是先前紀錄，可以使用搜尋工具輔助尋找
    </div>

    <select id="viewMode" onchange="applyFilter()">
        <option value="detail">心得詳情</option>
        <option value="count">陪課次數表</option>
    </select>

    <input type="date" id="filterDate">

    <select id="filterTeacher">
        <option value="">全部陪課員</option>
    </select>

    <select id="filterStudent">
        <option value="">全部被陪課成員</option>
    </select>

    <button onclick="applyFilter()">送出篩選</button>
    <button onclick="resetFilter()">清除</button>
</div>

<div id="syncMsg"></div>
<div id="records"></div>

</div>

<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbws0OC2ivLQJli-hAYc8JA5N2dA6Ts4SGLKNZaCLRVR3D_BDa_dUGaeUhipevUf9gdH/exec';

let records = [];
let filteredRecords = [];

window.onload = async () => {
    setNowClassTime();
    await loadFromSheets();
};

function setNowClassTime(){
    const now = new Date();
    now.setSeconds(0, 0);
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0,16);

    document.getElementById("classTime").value = local;
}

async function loadFromSheets(){
    try{
        const res = await fetch(GAS_URL);
        const data = await res.json();

        records = Array.isArray(data) ? data : [];
        filteredRecords = records;

        updateSelectOptions();
        render();
    } catch(err){
        showSyncMsg("❌ 無法讀取 Google Sheets", "fail");
    }
}

function handleTeacherChange(){
    const select = document.getElementById("teacher");

    if(select.value === "__add__"){
        document.getElementById("addTeacherBox").style.display = "flex";
        document.getElementById("newTeacherName").focus();
    }else{
        document.getElementById("addTeacherBox").style.display = "none";
    }
}

function confirmAddTeacher(){
    const input = document.getElementById("newTeacherName");
    const name = input.value.trim();

    if(!name){
        alert("請輸入陪課員名字");
        return;
    }

    const teacherSelect = document.getElementById("teacher");

    addOptionIfNotExists(teacherSelect, name, name);
    teacherSelect.value = name;

    input.value = "";
    document.getElementById("addTeacherBox").style.display = "none";
    updateSelectOptions();
}

function cancelAddTeacher(){
    document.getElementById("newTeacherName").value = "";
    document.getElementById("addTeacherBox").style.display = "none";
    document.getElementById("teacher").value = "";
}

async function addRecord(){
    const classTime = document.getElementById("classTime").value;
    const date = classTime ? classTime.slice(0,10) : "";
    const teacher = document.getElementById("teacher").value;
    const student = document.getElementById("student").value.trim();
    const status = document.getElementById("status").value.trim();

    if(!classTime || !teacher || teacher === "__add__" || !student){
        alert("請填陪課時間、陪課員與陪了誰");
        return;
    }

    const newRecord = {
        classTime,
        date,
        teacher,
        student,
        status
    };

    records.push(newRecord);
    filteredRecords = records;

    updateSelectOptions();
    render();

    await syncToSheets(newRecord);

    document.getElementById("student").value = "";
    document.getElementById("status").value = "";
    setNowClassTime();
}

function applyFilter(){
    const d = document.getElementById("filterDate").value;
    const teacher = document.getElementById("filterTeacher").value;
    const student = document.getElementById("filterStudent").value;

    filteredRecords = records.filter(r => {
        return (!d || r.date === d) &&
               (!teacher || r.teacher === teacher) &&
               (!student || r.student === student);
    });

    render();
}

function resetFilter(){
    document.getElementById("filterDate").value = "";
    document.getElementById("filterTeacher").value = "";
    document.getElementById("filterStudent").value = "";
    document.getElementById("viewMode").value = "detail";

    filteredRecords = records;
    render();
}

function updateSelectOptions(){
    const teacherSelect = document.getElementById("teacher");
    const filterTeacher = document.getElementById("filterTeacher");
    const filterStudent = document.getElementById("filterStudent");

    const currentTeacher = teacherSelect.value;

    const teachers = [...new Set(records.map(r => r.teacher).filter(Boolean))];
    const students = [...new Set(records.map(r => r.student).filter(Boolean))];

    teacherSelect.innerHTML = `
        <option value="">請輸入你的名字</option>
        <option value="__add__">＋ 新增陪課員</option>
    `;

    teachers.forEach(name => addOptionIfNotExists(teacherSelect, name, name));

    if(currentTeacher && currentTeacher !== "__add__"){
        addOptionIfNotExists(teacherSelect, currentTeacher, currentTeacher);
        teacherSelect.value = currentTeacher;
    }

    filterTeacher.innerHTML = `<option value="">全部陪課員</option>`;
    teachers.forEach(name => addOptionIfNotExists(filterTeacher, name, name));

    filterStudent.innerHTML = `<option value="">全部被陪課成員</option>`;
    students.forEach(name => addOptionIfNotExists(filterStudent, name, name));
}

function addOptionIfNotExists(select, value, text){
    const exists = [...select.options].some(option => option.value === value);

    if(!exists){
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
    }
}

function escapeHTML(str){
    return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatClassTime(value){
    if(!value) return "未填寫";
    return value.replace("T", " ");
}

function render(){
    const area = document.getElementById("records");
    const mode = document.getElementById("viewMode")?.value || "detail";

    area.innerHTML = "";

    if(mode === "count"){
        renderCountChart();
        return;
    }

    if(filteredRecords.length === 0){
        area.innerHTML = `<div class="empty-msg">目前沒有符合條件的紀錄</div>`;
        return;
    }

    filteredRecords.forEach((r) => {
        area.innerHTML += `
        <div class="card">
            <h3>${escapeHTML(r.student)}</h3>
            <p>👤 陪課員：${escapeHTML(r.teacher || "未填寫")}</p>
            <p>🕒 陪課時間：${escapeHTML(formatClassTime(r.classTime || r.date))}</p>
            <pre>${escapeHTML(r.status || "")}</pre>
        </div>`;
    });
}

function renderCountChart(){
    const area = document.getElementById("records");

    const today = new Date();
    const dates = [];

    for(let i = -15; i <= 15; i++){
        const d = new Date(today);
        d.setDate(today.getDate() + i);

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");

        dates.push(`${yyyy}-${mm}-${dd}`);
    }

    const countMap = {};

    dates.forEach(date => {
        countMap[date] = 0;
    });

    filteredRecords.forEach(r => {
        if(countMap[r.date] !== undefined){
            countMap[r.date]++;
        }
    });

    const maxCount = Math.max(...Object.values(countMap), 1);

    let html = `
        <div class="chart-box">
            <h3 class="chart-title">📊 陪課次數表：前15天 ～ 後15天</h3>
            <div class="chart">
    `;

    dates.forEach(date => {
        const count = countMap[date];
        const height = count === 0 ? 4 : (count / maxCount) * 200;

        html += `
            <div class="bar-wrap">
                <div class="bar-count">${count}</div>
                <div class="bar" style="height:${height}px"></div>
                <div class="bar-date">${date.slice(5)}</div>
            </div>
        `;
    });

    html += `
            </div>
        </div>
    `;

    area.innerHTML = html;
}

async function syncToSheets(record){
    showSyncMsg("⏳ 同步中...", "ing");

    try{
        await fetch(GAS_URL,{
            method:"POST",
            mode:"no-cors",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(record)
        });

        showSyncMsg("✅ 已同步", "ok");
    } catch(e){
        showSyncMsg("❌ 同步失敗", "fail");
    }
}

function showSyncMsg(msg,type){
    const el = document.getElementById("syncMsg");
    el.innerHTML = `<span class="sync-status sync-${type}">${msg}</span>`;
}

</script>
</body>
</html>
