<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">	
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>陪課紀錄</title>

<style>
body{
    font-family: Arial;
    background:#f3f6fa;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,.1);
}

h1{text-align:center;}

.input-group, .filter-group{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:15px;
}

input,textarea,select,button{
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

input,textarea{flex:1;}

textarea{
    min-height:80px;
}

button{
    background:#4a90e2;
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{opacity:.85;}

.card{
    background:#f8f9ff;
    padding:15px;
    margin-top:15px;
    border-radius:10px;
    border-left:5px solid #4a90e2;
}

.sync-status{
    font-size:13px;
    margin-top:6px;
    padding:6px 12px;
    border-radius:6px;
    display:inline-block;
}

.sync-ok{background:#d4edda;color:#276c3a;}
.sync-fail{background:#fde8e8;color:#9a2c2c;}
.sync-ing{background:#fff3cd;color:#856404;}

/* ===== 分隔線 ===== */
.divider{
    height:2px;
    background:#ddd;
    margin:25px 0;
}
</style>
</head>

<body>
<div class="container">
<h1>📚 陪課紀錄系統</h1>

<!-- ===== 新增區 ===== -->
<div class="input-group">
    <input type="date" id="date">
    <input type="text" id="student" placeholder="學生姓名">
    <textarea id="status" placeholder="輸入陪課內容"></textarea>
    <button onclick="addRecord()">新增紀錄</button>
</div>

<!-- ===== 分隔線 ===== -->
<div class="divider"></div>

<!-- ===== 篩選區 ===== -->
<div class="filter-group">
    <input type="date" id="filterDate">
    <input type="text" id="filterStudent" placeholder="篩選學生">
    <button onclick="applyFilter()">送出篩選</button>
    <button onclick="resetFilter()">清除</button>
</div>

<div id="syncMsg"></div>
<div id="records"></div>

</div>

<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbzoDlOApq17wk0-8VvOWHRRK4r3Wmrf_5lRIsprskGSRJM8N1cez24PXHCX7r6xgYHo/exec';

let records = [];
let filteredRecords = [];

window.onload = async () => {
    await loadFromSheets();
};

// ===== 讀資料 =====
async function loadFromSheets(){
    try{
        const res = await fetch(GAS_URL);
        const data = await res.json();

        records = data;
        filteredRecords = data;

        render();
    } catch(err){
        showSyncMsg("❌ 無法讀取 Google Sheets", "fail");
    }
}

// ===== 新增 =====
async function addRecord(){
    const date = document.getElementById("date").value;
    const student = document.getElementById("student").value.trim();
    const status = document.getElementById("status").value.trim();

    if(!date || !student){
        alert("請填日期與姓名");
        return;
    }

    const newRecord = { date, student, status };

    records.push(newRecord);
    filteredRecords = records;

    render();

    await syncToSheets(newRecord);

    document.getElementById("student").value = "";
    document.getElementById("status").value = "";
}

// ===== 篩選 =====
function applyFilter(){
    const d = document.getElementById("filterDate").value;
    const s = document.getElementById("filterStudent").value.trim();

    filteredRecords = records.filter(r => {
        return (!d || r.date === d) &&
               (!s || r.student.includes(s));
    });

    render();
}

// ===== 清除 =====
function resetFilter(){
    document.getElementById("filterDate").value = "";
    document.getElementById("filterStudent").value = "";

    filteredRecords = records;
    render();
}

// ===== 畫面 =====
function render(){
    const area = document.getElementById("records");
    area.innerHTML = "";

    filteredRecords.forEach((r) => {
        area.innerHTML += `
        <div class="card">
            <h3>${r.student}</h3>
            <p>📅 ${r.date}</p>
            <pre>${r.status}</pre>
        </div>`;
    });
}

// ===== 同步 =====
async function syncToSheets(record){
    showSyncMsg("⏳ 同步中...", "ing");

    try{
        await fetch(GAS_URL,{
            method:"POST",
            mode:"no-cors",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify(record)
        });

        showSyncMsg("✅ 已同步", "ok");
    } catch(e){
        showSyncMsg("❌ 同步失敗", "fail");
    }
}

function showSyncMsg(msg,type){
    const el = document.getElementById("syncMsg");
    el.innerHTML = `<span class="sync-status sync-${type}">${msg}</span>`;
}

</script>
</body>
</html>
