<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新竹一支會陪課紀錄</title>

<style>
:root{
    --blue:#4a6fe2;
    --blue-dark:#3a59c4;
    --blue-soft:#eef2ff;
    --ink:#2b2f3a;
    --ink-soft:#6b7280;
    --line:#e6e8f0;
    --bg:#eef1f8;
    --card:#ffffff;
    --ok-bg:#e3f6e9; --ok-fg:#1f7a43;
    --fail-bg:#fde8e8; --fail-fg:#9a2c2c;
    --ing-bg:#fff3cd; --ing-fg:#8a6400;
    --radius:14px;
}

*{box-sizing:border-box;}

body{
    font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",Arial,sans-serif;
    background:var(--bg);
    margin:0;
    padding:24px 16px 60px;
    color:var(--ink);
}

.wrap{
    max-width:880px;
    margin:auto;
}

/* ---------- Header ---------- */
.page-head{
    text-align:center;
    margin-bottom:22px;
}

.page-head .eyebrow{
    font-size:13px;
    letter-spacing:.08em;
    color:var(--blue-dark);
    font-weight:700;
    margin-bottom:4px;
}

.page-head h1{
    font-size:24px;
    margin:0;
}

.page-head p{
    color:var(--ink-soft);
    font-size:13.5px;
    margin:6px 0 0;
}

/* ---------- Section card shell ---------- */
.section{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow:0 2px 14px rgba(40,50,90,.07);
    padding:22px;
    margin-bottom:20px;
}

.section-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:16px;
}

.section-badge{
    width:30px;height:30px;
    border-radius:9px;
    background:var(--blue-soft);
    color:var(--blue-dark);
    display:flex;align-items:center;justify-content:center;
    font-size:16px;
    flex-shrink:0;
}

.section-title{
    font-size:16px;
    font-weight:700;
    margin:0;
}

.section-sub{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:2px 0 0;
}

/* ---------- Form ---------- */
.field{
    margin-bottom:14px;
}

.field label{
    display:block;
    font-size:12.5px;
    font-weight:700;
    color:var(--ink-soft);
    margin-bottom:6px;
}

.field-row{
    display:flex;
    gap:12px;
}

.field-row .field{
    flex:1;
    min-width:0;
}

input,textarea,select,button{
    font-family:inherit;
    font-size:14.5px;
}

input,textarea,select{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:#fbfcff;
    color:var(--ink);
    transition:border-color .15s, background .15s;
}

input:focus,textarea:focus,select:focus{
    outline:none;
    border-color:var(--blue);
    background:#fff;
}

textarea{
    min-height:110px;
    resize:vertical;
    line-height:1.5;
}

.add-entity-box{
    display:none;
    gap:8px;
    margin-top:8px;
}

.add-entity-box input{flex:1;}

.add-entity-box button{
    flex-shrink:0;
    width:auto;
    padding:0 16px;
}

.btn-primary{
    width:100%;
    background:var(--blue);
    color:#fff;
    border:none;
    border-radius:10px;
    padding:13px;
    font-weight:700;
    cursor:pointer;
    transition:background .15s, transform .1s;
}

.btn-primary:hover{background:var(--blue-dark);}
.btn-primary:active{transform:scale(.99);}

.btn-ghost{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
    border-radius:10px;
    cursor:pointer;
    padding:0 16px;
}

.btn-ghost:hover{
    border-color:var(--blue);
    color:var(--blue-dark);
}

.sync-status{
    font-size:13px;
    margin-top:12px;
    padding:9px 14px;
    border-radius:10px;
    display:flex;
    align-items:center;
    gap:8px;
    font-weight:600;
}

.sync-ok{background:var(--ok-bg);color:var(--ok-fg);}
.sync-fail{background:var(--fail-bg);color:var(--fail-fg);}
.sync-ing{background:var(--ing-bg);color:var(--ing-fg);}

/* ---------- Filter section ---------- */
.view-toggle{
    display:flex;
    background:var(--blue-soft);
    border-radius:10px;
    padding:4px;
    margin-bottom:14px;
}

.view-toggle button{
    flex:1;
    border:none;
    background:transparent;
    padding:9px 0;
    border-radius:8px;
    font-weight:700;
    font-size:13.5px;
    color:var(--blue-dark);
    cursor:pointer;
}

.view-toggle button.active{
    background:var(--blue);
    color:#fff;
}

.filter-grid{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:10px;
    margin-bottom:12px;
}

.filter-actions{
    display:flex;
    gap:10px;
}

.filter-actions button{
    border-radius:10px;
    padding:10px 18px;
    cursor:pointer;
    font-weight:700;
    font-size:13.5px;
    border:none;
}

.filter-actions .apply{
    background:var(--blue);
    color:#fff;
}

.filter-actions .apply:hover{background:var(--blue-dark);}

.filter-actions .reset{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
}

.filter-actions .reset:hover{
    border-color:var(--blue);
    color:var(--blue-dark);
}

.result-count{
    font-size:12.5px;
    color:var(--ink-soft);
    margin:14px 0 10px;
}

/* ---------- Record cards ---------- */
.card{
    background:#fbfcff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px 18px;
    margin-bottom:12px;
    border-left:4px solid var(--blue);
}

.card-top{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:8px;
}

.card-student{
    font-size:16px;
    font-weight:700;
    margin:0;
}

.card-time{
    font-size:12px;
    color:var(--ink-soft);
    white-space:nowrap;
}

.card-teacher{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:12.5px;
    color:var(--blue-dark);
    background:var(--blue-soft);
    padding:3px 10px;
    border-radius:99px;
    margin-bottom:10px;
}

.card pre{
    white-space:pre-wrap;
    word-break:break-word;
    font-family:inherit;
    font-size:13.5px;
    line-height:1.6;
    color:var(--ink);
    margin:0;
}

.card pre:empty::before{
    content:"（沒有填寫心得內容）";
    color:#aab0bd;
}

/* ---------- Chart ---------- */
.chart-box{
    background:#fbfcff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:16px;
    overflow-x:auto;
}

.chart-title{
    margin:0 0 14px;
    font-size:14px;
    font-weight:700;
}

.chart{
    display:flex;
    align-items:flex-end;
    gap:8px;
    height:220px;
    border-left:2px solid var(--line);
    border-bottom:2px solid var(--line);
    padding:10px 10px 0;
    min-width:900px;
}

.bar-wrap{
    text-align:center;
    font-size:11px;
    color:var(--ink-soft);
    flex:1;
}

.bar-wrap.is-today .bar{
    background:#ff8a3d;
}

.bar-wrap.is-today .bar-date{
    color:#ff8a3d;
    font-weight:700;
}

.bar{
    width:22px;
    background:var(--blue);
    border-radius:5px 5px 0 0;
    margin:auto;
    transition:height .25s;
}

.bar-count{
    font-size:11.5px;
    margin-bottom:4px;
    font-weight:700;
    color:var(--ink);
}

.bar-date{
    writing-mode:vertical-rl;
    margin-top:6px;
}

/* ---------- Empty / warn states ---------- */
.empty-msg{
    text-align:center;
    color:var(--ink-soft);
    padding:36px 0;
    font-size:13.5px;
}

.empty-msg .emoji{
    font-size:30px;
    display:block;
    margin-bottom:8px;
}

.warn-msg{
    background:var(--ing-bg);
    color:var(--ing-fg);
    padding:14px 16px;
    border-radius:10px;
    font-size:13.5px;
}


/* ---------- Manage people ---------- */
.manage-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
}

.manage-card{
    background:#fbfcff;
    border:1px solid var(--line);
    border-radius:12px;
    padding:14px;
}

.manage-card h3{
    margin:0 0 10px;
    font-size:14px;
}

.person-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    padding:9px 0;
    border-bottom:1px solid var(--line);
}

.person-row:last-child{border-bottom:none;}

.person-name{
    font-size:13.5px;
    font-weight:700;
}

.person-actions{
    display:flex;
    gap:6px;
    flex-shrink:0;
}

.btn-small{
    border:none;
    border-radius:8px;
    padding:6px 9px;
    font-size:12px;
    font-weight:700;
    cursor:pointer;
}

.btn-delete-soft{
    background:var(--ing-bg);
    color:var(--ing-fg);
}

.btn-delete-hard{
    background:var(--fail-bg);
    color:var(--fail-fg);
}

.manage-note{
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.6;
    margin:0 0 12px;
}

/* ---------- Mobile ---------- */
@media(max-width:640px){
    body{padding:16px 10px 50px;}

    .section{padding:16px;}

    .field-row{
        flex-direction:column;
        gap:0;
    }

    .filter-grid{
        grid-template-columns:1fr;
    }

    .filter-actions{
        flex-direction:column;
    }

    .manage-grid{
        grid-template-columns:1fr;
    }

    .filter-actions button{
        width:100%;
    }

    .add-entity-box{
        flex-direction:column;
    }

    .add-entity-box input,
    .add-entity-box button{
        width:100%;
    }

    #newTeacherName,
    #newStudentName{
        font-size:16px;
        padding:12px;
    }

    .card-top{
        flex-direction:column;
        gap:2px;
    }

    .chart{
        height:200px;
        min-width:820px;
    }
}
</style>
</head>

<body>
<div class="wrap">

<div class="page-head">
    <div class="eyebrow">新竹一支會</div>
    <h1>📚 陪課紀錄系統</h1>
    <p>陪課結束後花一分鐘記錄，讓每一次陪伴都被看見</p>
</div>

<!-- 新增紀錄 -->
<div class="section">
    <div class="section-head">
        <div class="section-badge">✏️</div>
        <div>
            <p class="section-title">新增今日陪課紀錄</p>
            <p class="section-sub">陪課完之後，花一分鐘記下今天的狀況</p>
        </div>
    </div>

    <div class="field-row">
        <div class="field">
            <label for="classTime">陪課時間</label>
            <input type="datetime-local" id="classTime">
        </div>
        <div class="field">
            <label for="teacher">你是誰</label>
            <select id="teacher" onchange="handleTeacherChange()">
                <option value="">請選擇你的名字</option>
                <option value="__add__">＋ 新增陪課員</option>
            </select>
            <div id="addTeacherBox" class="add-entity-box">
                <input type="text" id="newTeacherName" placeholder="輸入新的陪課員名字">
                <button type="button" class="btn-ghost" onclick="confirmAddTeacher()">確認</button>
                <button type="button" class="btn-ghost" onclick="cancelAddTeacher()">取消</button>
            </div>
        </div>
    </div>

    <div class="field">
        <label for="student">陪了誰</label>
        <select id="student" onchange="handleStudentChange()">
            <option value="">請選擇被陪課成員</option>
            <option value="__add__">＋ 新增被陪課成員</option>
        </select>
        <div id="addStudentBox" class="add-entity-box">
            <input type="text" id="newStudentName" placeholder="輸入新的被陪課成員名字">
            <button type="button" class="btn-ghost" onclick="confirmAddStudent()">確認</button>
            <button type="button" class="btn-ghost" onclick="cancelAddStudent()">取消</button>
        </div>
    </div>

    <div class="field">
        <label for="status">陪課內容 / 心得</label>
        <textarea id="status" placeholder="今天上了什麼？孩子的狀況如何？有什麼想記下來的..."></textarea>
    </div>

    <button class="btn-primary" onclick="addRecord()">送出紀錄</button>

    <div id="syncMsg"></div>
</div>

<!-- 查詢紀錄 -->
<div class="section">
    <div class="section-head">
        <div class="section-badge">🔍</div>
        <div>
            <p class="section-title">查詢先前紀錄</p>
            <p class="section-sub">用篩選工具快速找到你要的紀錄</p>
        </div>
    </div>

    <div class="view-toggle">
        <button type="button" id="btn-detail" class="active" onclick="setViewMode('detail')">📝 心得詳情</button>
        <button type="button" id="btn-count" onclick="setViewMode('count')">📊 陪課次數表</button>
    </div>

    <div class="filter-grid">
        <div class="field" style="margin-bottom:0;">
            <label for="filterDate">日期</label>
            <input type="date" id="filterDate">
        </div>
        <div class="field" style="margin-bottom:0;">
            <label for="filterTeacher">陪課員</label>
            <select id="filterTeacher" onchange="handleFilterTeacherChange()">
                <option value="">全部陪課員</option>
            </select>
        </div>
        <div class="field" style="margin-bottom:0;">
            <label for="filterStudent">被陪課成員</label>
            <select id="filterStudent" onchange="handleFilterStudentChange()">
                <option value="">全部被陪課成員</option>
            </select>
        </div>
    </div>

    <div class="filter-actions">
        <button class="apply" onclick="applyFilter()">送出篩選</button>
        <button class="reset" onclick="resetFilter()">清除篩選</button>
    </div>

    <div id="resultCount" class="result-count"></div>
    <div id="records"></div>
</div>


<!-- 管理名單 -->
<div class="section">
    <div class="section-head">
        <div class="section-badge">⚙️</div>
        <div>
            <p class="section-title">管理陪課員與被陪課成員</p>
            <p class="section-sub">可以只從名單移除，也可以連同相關陪課紀錄一起刪除</p>
        </div>
    </div>

    <p class="manage-note">
        「從名單移除」會保留舊紀錄，只是不再出現在下拉選單。
        「連紀錄刪除」會把這個人的相關陪課紀錄也一起刪掉。
    </p>

    <div class="manage-grid">
        <div class="manage-card">
            <h3>陪課員名單</h3>
            <div id="teacherManageList"></div>
        </div>
        <div class="manage-card">
            <h3>被陪課成員名單</h3>
            <div id="studentManageList"></div>
        </div>
    </div>
</div>

</div>

<script>

const GAS_URL = 'https://script.google.com/macros/s/AKfycbytO2G46eDADyqxfIjXyhQ2xg1nFj9tBNFoDPvLwt4vCryn_RKJbVfy-mfY_5bcWzEM/exec';

let records = [];
let filteredRecords = [];
let teachers = [];
let students = [];
let currentViewMode = "detail";

window.onload = async () => {
    setNowClassTime();
    await loadFromSheets();
};

function setNowClassTime(){
    const now = new Date();
    now.setSeconds(0, 0);
    const local = new Date(now.getTime() - now.getTimezoneOffset() * 60000)
        .toISOString()
        .slice(0,16);

    document.getElementById("classTime").value = local;
}

async function loadFromSheets(){
    try{
        const res = await fetch(`${GAS_URL}?action=init`);
        const data = await res.json();

        records = Array.isArray(data.records) ? data.records : [];
        teachers = Array.isArray(data.teachers) ? data.teachers.map(p => p.name) : [];
        students = Array.isArray(data.students) ? data.students.map(p => p.name) : [];
        filteredRecords = records;

        syncPeopleFromOldRecords();
        updateSelectOptions();
        renderDetail();
        renderManageLists();
    } catch(err){
        showSyncMsg("❌ 無法讀取 Google Sheets", "fail");
    }
}

function handleTeacherChange(){
    const select = document.getElementById("teacher");

    if(select.value === "__add__"){
        document.getElementById("addTeacherBox").style.display = "flex";
        document.getElementById("newTeacherName").focus();
    }else{
        document.getElementById("addTeacherBox").style.display = "none";
    }
}

async function confirmAddTeacher(){
    const input = document.getElementById("newTeacherName");
    const name = input.value.trim();

    if(!name){
        alert("請輸入陪課員名字");
        return;
    }

    if(!teachers.includes(name)){
        teachers.push(name);
    }

    const teacherSelect = document.getElementById("teacher");
    addOptionIfNotExists(teacherSelect, name, name);
    teacherSelect.value = name;

    input.value = "";
    document.getElementById("addTeacherBox").style.display = "none";
    updateSelectOptions();
    renderManageLists();

    await postToSheets({ action:"addTeacher", name });
}

function cancelAddTeacher(){
    document.getElementById("newTeacherName").value = "";
    document.getElementById("addTeacherBox").style.display = "none";
    document.getElementById("teacher").value = "";
}

function handleStudentChange(){
    const select = document.getElementById("student");

    if(select.value === "__add__"){
        document.getElementById("addStudentBox").style.display = "flex";
        document.getElementById("newStudentName").focus();
    }else{
        document.getElementById("addStudentBox").style.display = "none";
    }
}

async function confirmAddStudent(){
    const input = document.getElementById("newStudentName");
    const name = input.value.trim();

    if(!name){
        alert("請輸入被陪課成員名字");
        return;
    }

    if(!students.includes(name)){
        students.push(name);
    }

    const studentSelect = document.getElementById("student");
    addOptionIfNotExists(studentSelect, name, name);
    studentSelect.value = name;

    input.value = "";
    document.getElementById("addStudentBox").style.display = "none";
    updateSelectOptions();
    renderManageLists();

    await postToSheets({ action:"addStudent", name });
}

function cancelAddStudent(){
    document.getElementById("newStudentName").value = "";
    document.getElementById("addStudentBox").style.display = "none";
    document.getElementById("student").value = "";
}

async function addRecord(){
    const classTime = document.getElementById("classTime").value;
    const date = classTime ? classTime.slice(0,10) : "";
    const teacher = document.getElementById("teacher").value;
    const student = document.getElementById("student").value;
    const status = document.getElementById("status").value.trim();

    if(!classTime || !teacher || teacher === "__add__" || !student || student === "__add__"){
        alert("請填陪課時間、陪課員與陪了誰");
        return;
    }

    const newRecord = {
        classTime,
        date,
        teacher,
        student,
        status
    };

    records.push(newRecord);
    filteredRecords = records;

    if(!teachers.includes(teacher)) teachers.push(teacher);
    if(!students.includes(student)) students.push(student);

    updateSelectOptions();
    renderDetail();
    renderManageLists();

    await syncToSheets(newRecord);

    document.getElementById("student").value = "";
    document.getElementById("status").value = "";
    setNowClassTime();
}

function setViewMode(mode){
    currentViewMode = mode;

    document.getElementById("btn-detail").classList.toggle("active", mode === "detail");
    document.getElementById("btn-count").classList.toggle("active", mode === "count");

    applyFilter();
}

function handleFilterTeacherChange(){
    const teacher = document.getElementById("filterTeacher").value;
    if(teacher){
        document.getElementById("filterStudent").value = "";
    }
}

function handleFilterStudentChange(){
    const student = document.getElementById("filterStudent").value;
    if(student){
        document.getElementById("filterTeacher").value = "";
    }
}

function applyFilter(){
    const mode = currentViewMode;
    const d = document.getElementById("filterDate").value;
    const teacher = document.getElementById("filterTeacher").value;
    const student = document.getElementById("filterStudent").value;

    document.getElementById("resultCount").textContent = "";

    if(mode === "count" && !teacher && !student){
        document.getElementById("records").innerHTML = `
            <div class="warn-msg">
                ⚠️ 請先選擇「陪課員」或「被陪課成員」，再查看陪課次數表。
            </div>
        `;
        return;
    }

    filteredRecords = records.filter(r => {
        return (!d || r.date === d) &&
               (!teacher || r.teacher === teacher) &&
               (!student || r.student === student);
    });

    // 除錯用：在瀏覽器 console 可以看到目前資料筆數與篩選結果
    console.log("[陪課紀錄] records 總筆數:", records.length);
    console.log("[陪課紀錄] filteredRecords 筆數:", filteredRecords.length);
    if(records.length > 0){
        console.log("[陪課紀錄] 第一筆原始資料樣本:", records[0]);
    }

    if(mode === "count"){
        renderCountChart();
    }else{
        renderDetail();
    }
}

function resetFilter(){
    document.getElementById("filterDate").value = "";
    document.getElementById("filterTeacher").value = "";
    document.getElementById("filterStudent").value = "";

    setViewMode("detail");
}

function updateSelectOptions(){
    const teacherSelect = document.getElementById("teacher");
    const studentSelect = document.getElementById("student");
    const filterTeacher = document.getElementById("filterTeacher");
    const filterStudent = document.getElementById("filterStudent");

    const currentTeacher = teacherSelect.value;
    const currentStudent = studentSelect.value;
    const currentFilterTeacher = filterTeacher.value;
    const currentFilterStudent = filterStudent.value;

    const teacherNames = [...new Set(teachers.filter(Boolean))];
    const studentNames = [...new Set(students.filter(Boolean))];

    teacherSelect.innerHTML = `
        <option value="">請選擇你的名字</option>
        <option value="__add__">＋ 新增陪課員</option>
    `;

    teacherNames.forEach(name => addOptionIfNotExists(teacherSelect, name, name));

    if(currentTeacher && currentTeacher !== "__add__"){
        addOptionIfNotExists(teacherSelect, currentTeacher, currentTeacher);
        teacherSelect.value = currentTeacher;
    }

    studentSelect.innerHTML = `
        <option value="">請選擇被陪課成員</option>
        <option value="__add__">＋ 新增被陪課成員</option>
    `;

    studentNames.forEach(name => addOptionIfNotExists(studentSelect, name, name));

    if(currentStudent && currentStudent !== "__add__"){
        addOptionIfNotExists(studentSelect, currentStudent, currentStudent);
        studentSelect.value = currentStudent;
    }

    filterTeacher.innerHTML = `<option value="">全部陪課員</option>`;
    teacherNames.forEach(name => addOptionIfNotExists(filterTeacher, name, name));

    if(currentFilterTeacher){
        addOptionIfNotExists(filterTeacher, currentFilterTeacher, currentFilterTeacher);
        filterTeacher.value = currentFilterTeacher;
    }

    filterStudent.innerHTML = `<option value="">全部被陪課成員</option>`;
    studentNames.forEach(name => addOptionIfNotExists(filterStudent, name, name));

    if(currentFilterStudent){
        addOptionIfNotExists(filterStudent, currentFilterStudent, currentFilterStudent);
        filterStudent.value = currentFilterStudent;
    }
}

function syncPeopleFromOldRecords(){
    records.forEach(r => {
        if(r.teacher && !teachers.includes(r.teacher)) teachers.push(r.teacher);
        if(r.student && !students.includes(r.student)) students.push(r.student);
    });
}

function renderManageLists(){
    renderPersonList("teacherManageList", teachers, "teacher");
    renderPersonList("studentManageList", students, "student");
}

function renderPersonList(elementId, list, type){
    const area = document.getElementById(elementId);
    const uniqueList = [...new Set(list.filter(Boolean))].sort((a,b) => a.localeCompare(b, "zh-Hant"));

    if(uniqueList.length === 0){
        area.innerHTML = `<div class="empty-msg" style="padding:18px 0;">目前沒有名單</div>`;
        return;
    }

    area.innerHTML = uniqueList.map(name => {
        const safeName = escapeHTML(name);
        const recordCount = records.filter(r => type === "teacher" ? r.teacher === name : r.student === name).length;

        return `
            <div class="person-row">
                <div>
                    <div class="person-name">${safeName}</div>
                    <div class="result-count" style="margin:3px 0 0;">相關紀錄：${recordCount} 筆</div>
                </div>
                <div class="person-actions">
                    <button type="button" class="btn-small btn-delete-soft" onclick="deletePerson('${type}', '${encodeURIComponent(name)}', false)">移除名單</button>
                    <button type="button" class="btn-small btn-delete-hard" onclick="deletePerson('${type}', '${encodeURIComponent(name)}', true)">連紀錄刪除</button>
                </div>
            </div>
        `;
    }).join("");
}

async function deletePerson(type, encodedName, deleteRecords){
    const name = decodeURIComponent(encodedName);
    const typeLabel = type === "teacher" ? "陪課員" : "被陪課成員";
    const count = records.filter(r => type === "teacher" ? r.teacher === name : r.student === name).length;

    let message = `確定要從名單移除「${name}」嗎？\n\n舊紀錄會保留，只是不再出現在下拉選單。`;

    if(deleteRecords){
        message = `危險操作！\n\n確定要刪除${typeLabel}「${name}」，並連同 ${count} 筆相關紀錄一起刪除嗎？`;
    }

    if(!confirm(message)) return;

    if(type === "teacher"){
        teachers = teachers.filter(t => t !== name);
        if(deleteRecords){
            records = records.filter(r => r.teacher !== name);
        }
    }else{
        students = students.filter(s => s !== name);
        if(deleteRecords){
            records = records.filter(r => r.student !== name);
        }
    }

    filteredRecords = records;
    updateSelectOptions();
    renderDetail();
    renderManageLists();

    await postToSheets({
        action: type === "teacher" ? "deleteTeacher" : "deleteStudent",
        name,
        deleteRecords
    });
}

function addOptionIfNotExists(select, value, text){
    const exists = [...select.options].some(option => option.value === value);

    if(!exists){
        const option = document.createElement("option");
        option.value = value;
        option.textContent = text;
        select.appendChild(option);
    }
}

function escapeHTML(str){
    return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function formatClassTime(value){
    if(!value) return "未填寫";
    return value.replace("T", " ");
}

function renderDetail(){
    const area = document.getElementById("records");
    const countEl = document.getElementById("resultCount");
    area.innerHTML = "";

    if(filteredRecords.length === 0){
        countEl.textContent = "";
        area.innerHTML = `
            <div class="empty-msg">
                <span class="emoji">📭</span>
                目前沒有符合條件的紀錄
            </div>`;
        return;
    }

    countEl.textContent = `共 ${filteredRecords.length} 筆紀錄`;

    const sorted = [...filteredRecords].sort((a, b) => {
        return (b.classTime || b.date || "").localeCompare(a.classTime || a.date || "");
    });

    sorted.forEach((r) => {
        area.innerHTML += `
        <div class="card">
            <div class="card-top">
                <h3 class="card-student">${escapeHTML(r.student)}</h3>
                <span class="card-time">🕒 ${escapeHTML(formatClassTime(r.classTime || r.date))}</span>
            </div>
            <span class="card-teacher">👤 ${escapeHTML(r.teacher || "未填寫")}</span>
            <pre>${escapeHTML(r.status || "")}</pre>
        </div>`;
    });
}

// 將各種可能的日期字串／格式統一轉成 yyyy-MM-dd，避免比對失敗
function normalizeDateStr(value){
    if(!value) return "";

    const str = String(value).trim();

    // 已經是 yyyy-MM-dd 開頭，直接取前10碼
    const isoMatch = str.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
    if(isoMatch){
        const yyyy = isoMatch[1];
        const mm = isoMatch[2].padStart(2, "0");
        const dd = isoMatch[3].padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
    }

    // 嘗試讓瀏覽器自行解析（例如 2026/6/21 或含時間的字串）
    const parsed = new Date(str);
    if(!isNaN(parsed.getTime())){
        const yyyy = parsed.getFullYear();
        const mm = String(parsed.getMonth() + 1).padStart(2, "0");
        const dd = String(parsed.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
    }

    return str;
}

function renderCountChart(){
    const area = document.getElementById("records");
    const countEl = document.getElementById("resultCount");

    const today = new Date();
    const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;
    const dates = [];

    for(let i = -15; i <= 15; i++){
        const d = new Date(today);
        d.setDate(today.getDate() + i);

        const yyyy = d.getFullYear();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");

        dates.push(`${yyyy}-${mm}-${dd}`);
    }

    const countMap = {};
    dates.forEach(date => countMap[date] = 0);

    let unmatchedCount = 0;

    filteredRecords.forEach(r => {
        // 優先用 date 欄位，沒有的話退而用 classTime 的前10碼當備援
        const rawDate = r.date || r.classTime || "";
        const normalized = normalizeDateStr(rawDate);

        if(countMap[normalized] !== undefined){
            countMap[normalized]++;
        }else{
            unmatchedCount++;
        }
    });

    if(unmatchedCount > 0){
        console.warn(`[陪課紀錄] 有 ${unmatchedCount} 筆資料的日期落在顯示區間外，或日期格式無法辨識`);
    }

    const totalCount = Object.values(countMap).reduce((a,b) => a+b, 0);
    const maxCount = Math.max(...Object.values(countMap), 1);

    countEl.textContent = `區間內共 ${totalCount} 筆紀錄`;

    if(totalCount === 0 && filteredRecords.length > 0){
        area.innerHTML = `
            <div class="warn-msg">
                ⚠️ 篩選到 ${filteredRecords.length} 筆資料，但日期都不在「前15天～後15天」範圍內，或日期格式無法辨識。
                請打開瀏覽器主控台（F12 → Console）查看詳細訊息。
            </div>
        `;
        return;
    }

    let html = `
        <div class="chart-box">
            <h3 class="chart-title">📊 陪課次數表：前15天 ～ 後15天</h3>
            <div class="chart">
    `;

    dates.forEach(date => {
        const count = countMap[date];
        const height = count === 0 ? 4 : (count / maxCount) * 180;
        const todayClass = date === todayStr ? " is-today" : "";

        html += `
            <div class="bar-wrap${todayClass}">
                <div class="bar-count">${count}</div>
                <div class="bar" style="height:${height}px"></div>
                <div class="bar-date">${date.slice(5)}${date === todayStr ? " ・今天" : ""}</div>
            </div>
        `;
    });

    html += `
            </div>
        </div>
    `;

    area.innerHTML = html;
}

async function syncToSheets(record){
    showSyncMsg("⏳ 同步中...", "ing");

    try{
        await postToSheets({ action:"addRecord", ...record });
        showSyncMsg("✅ 已同步至雲端", "ok");
    } catch(e){
        showSyncMsg("❌ 同步失敗，請檢查網路後再試一次", "fail");
    }
}

async function postToSheets(payload){
    await fetch(GAS_URL,{
        method:"POST",
        mode:"no-cors",
        headers:{ "Content-Type":"application/json" },
        body:JSON.stringify(payload)
    });
}

function showSyncMsg(msg,type){
    const el = document.getElementById("syncMsg");
    el.innerHTML = `<div class="sync-status sync-${type}">${msg}</div>`;
}

</script>
